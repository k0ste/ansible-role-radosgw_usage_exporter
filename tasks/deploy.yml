---
- name: "rgw_exporter | Deploy rgw_exporter service configuration"
  ansible.builtin.template:
    src: "radosgw_usage_exporter.j2"
    dest: "{{ '/etc/systemd/system/' + lookup('ansible.builtin.vars',
      'rgw_exporter_service') }}"
    owner: "root"
    group: "root"
    mode: "0644"
  notify:
    - "Daemon reload"
    - "Restart rgw_exporter"
- name: "rgw_exporter | Enable rgw_exporter"
  ansible.builtin.systemd:
    name: "{{ lookup('ansible.builtin.vars', 'rgw_exporter_service') }}"
    enabled: "yes"
  when:
    - "lookup('ansible.builtin.vars', 'radosgw_usage_exporter', default='')
      not in ['', [], '[]', None]"
    - "lookup('ansible.builtin.vars', 'radosgw_usage_exporter') |
       community.general.json_query(lookup('ansible.builtin.vars',
      'rgw_exporter_enable', default='')) == 'true'"
  vars:
    rgw_exporter_enable: "[] | map(&enable || 'false', @) | [0]"
- name: "rgw_exporter | Ensure docker is run"
  ansible.builtin.systemd:
    name: "docker"
    state: "started"
    enabled: "yes"
  when:
    - "lookup('ansible.builtin.vars', 'radosgw_usage_exporter', default='')
      not in ['', [], '[]', None]"
    - "lookup('ansible.builtin.vars', 'radosgw_usage_exporter') |
       community.general.json_query(lookup('ansible.builtin.vars',
      'rgw_exporter_enable', default='')) == 'true'"
  vars:
    rgw_exporter_enable: "[] | map(&enable || 'false', @) | [0]"
